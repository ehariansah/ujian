<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ujian SMAN 4 Barru</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="apple-touch-icon" href="./favicon.png">
    <link rel="manifest" href="./manifest.json">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                    .then((reg) => console.log('Service Worker terdaftar!', reg))
                    .catch((err) => console.log('Gagal mendaftarkan Service Worker', err));
            });
        }
    </script>

    <style>
        /* =========================================================================
           1. RESET & LAYOUT DASAR
           ========================================================================= */
        *, ::before, ::after {
            box-sizing: border-box;
        }
        
        body {
            padding: 70px 20px;
            background: linear-gradient(rgb(26, 97, 153) 300px, rgb(233, 231, 247) 300px);
            min-height: 100dvh;
            margin: 0;
        }

        /* =========================================================================
           2. ELEMEN BRANDING (LOGO)
           ========================================================================= */
        .gambar-kepala {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .gambar-kepala img {
            width: 100px;
            height: 100px;
            margin: 0;
        }

        /* =========================================================================
           3. CONTAINER UTAMA & FORM INPUT
           ========================================================================= */
        .scanner-container {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 15px;
            background: rgb(255, 255, 255);
            border-radius: 15px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 10px 25px;
        }

        .scanner-container h1 {
            font-size: 20px;
            margin: 0 0 10px;
            text-align: center;
        }

        .scanner-container p {
            color: #666666;
            font-size: 14px;
            margin-bottom: 20px;
            text-align: center;
        }

        .box-input {
            padding: 15px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #666666;
            border-radius: 5px;
            font-size: 14px;
            width: 75%;
        }

        /* =========================================================================
           4. TOMBOL AKSI & PANEL SCANNER
           ========================================================================= */
        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px 0;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            width: 25%;
            text-decoration: none;
        }

        #btnList {
            margin-bottom: 15px;
            width: 100%;
        }

        #btnToggleScan {
            width: 100%;
        }

        #reader {
            width: 100%;
            max-width: 470px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            background: #000000;
            color: #ffffff;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    
    <div class="gambar-kepala">
        <img src="./logo-200.png" alt="Logo Sekolah" />
    </div>

    <div class="scanner-container">
        <h1>E-UJIAN SMAN 4 BARRU</h1>
        <p>Masukkan tautan, pilih ujian aktif, atau scan QR Code untuk membuka halaman ujian.</p>
            
        <div class="box-input">
            <div class="input-group">
                <input id="urlInput" placeholder="Masukkan tautan ujian..." type="url" />
                <button class="btn-action" id="btnLoadManual">Buka</button>
            </div>
            <a class="btn-action" id="btnList" href="https://ujian.sman4barru.sch.id/lobi/">Pilih Ujian Aktif</a>
            <button class="btn-action" id="btnToggleScan">Scan QR Code</button>
        </div>

        <div id="reader"></div>
    </div>

    <script>
        // =========================================================================
        // 1. ENGINE ROUTING, QR SCANNER, DAN PEMBUATAN TOKEN OTENTIKASI
        // =========================================================================
        document.addEventListener("DOMContentLoaded", function() {
            let html5QrcodeScanner = null;
            const halamanViewerUrl = "https://ujian.sman4barru.sch.id/run/"; 

            const btnLoadManual = document.getElementById('btnLoadManual');
            const btnToggleScan = document.getElementById('btnToggleScan');
            const urlInput = document.getElementById('urlInput');

            if (btnLoadManual) btnLoadManual.addEventListener('click', loadIframeFromInput);
            if (btnToggleScan) btnToggleScan.addEventListener('click', toggleScanner);

            function kirimKeViewer(url) {
                let targetUrl = url.trim();
                let encodedUrl = encodeURIComponent(targetUrl);
            
                // Generate token waktu detik saat ini secara real-time demi keamanan berlapis
                const tokenWaktuAktif = Math.floor(Date.now() / 1000);
            
                // Lempar pengguna ke Halaman Viewer menggunakan metode proteksi .replace()
                window.location.replace(halamanViewerUrl + "?url=" + encodedUrl + "&auth=" + tokenWaktuAktif);
            }

            function loadIframeFromInput() {
                const inputVal = urlInput.value;
                if (inputVal) {
                    kirimKeViewer(inputVal);
                } else {
                    alert("Harap masukkan tautan terlebih dahulu!");
                }
            }

            function toggleScanner() {
                const readerDiv = document.getElementById('reader');

                if (!html5QrcodeScanner) {
                    readerDiv.style.display = 'block';
                    btnToggleScan.innerText = "Matikan Kamera QR";
                    btnToggleScan.style.backgroundColor = "#dc3545";

                    html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                    );
                    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                } else {
                    stopScanner();
                }
            }

            function onScanSuccess(decodedText, decodedResult) {
                stopScanner();
                kirimKeViewer(decodedText);
            }

            function onScanFailure(error) {
            }

            function stopScanner() {
                const readerDiv = document.getElementById('reader');
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.clear().then(() => {
                        html5QrcodeScanner = null;
                        readerDiv.style.display = 'none';
                        btnToggleScan.innerText = "Scan QR Code";
                        btnToggleScan.style.backgroundColor = "#28a745";
                    }).catch(err => {
                        console.error(err);
                    });
                }
            }
        });
          
        // =========================================================================
        // 2. SISTEM ANTI-BACK TOTAL (PENGUNCI GERBANG UTAMA)
        // =========================================================================
        (function () {
            function kunciRiwayat() {
                window.history.pushState(null, null, window.location.href);
            }

            kunciRiwayat();

            window.addEventListener('popstate', function (event) {
                kunciRiwayat();
            });
        })();
    </script>
</body>
</html>
