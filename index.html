<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ujian SMAN 4 Barru</title>
    <link rel="icon" type="image/png" href="./favicon.png">

    <link rel="apple-touch-icon" href="./favicon.png">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="manifest" href="./manifest.json">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((reg) => console.log('Service Worker terdaftar!', reg))
            .catch((err) => console.log('Gagal mendaftarkan Service Worker', err));
        });
      }
    </script>

    <style>
        body {
            padding: 20px;
            background: linear-gradient(rgb(26, 97, 153) 33.33%, rgb(233, 231, 247) 33.33%);
            min-height: 100vh;
            margin: 0;
        }
        
        .gambar-kepala {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .gambar-kepala img {
            width: 100px;
            height: 100px;
            margin: 0 !important;
        }

        .scanner-container {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 20px 15px;
            background: rgb(255, 255, 255);
            border-radius: 15px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 10px 25px;
            box-sizing: border-box;
        }

        .scanner-container h1 {
	    	font-size: 20px;
	    	margin: 0 0 10px;
    	}

        .box-input {
            padding: 15px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .input-group {
            display: flex;
            flex-wrap: unset;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            box-sizing: border-box;
            min-width: 150px;
        }

        .btn-action {
            padding: 12px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .btn-action:hover {
            background: #0056b3;
        }

        #btnList {
            margin-bottom: 15px;
        }

        #btnList, #btnToggleScan {
            width: 100%;
            background: #28a745;
        }

        #btnList:hover, #btnToggleScan:hover {
            background: #218838;
        }

        #reader {
            width: 100%;
            max-width: 470px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            background: #000;
            color: #fff;
			margin-top: 15px;
			box-sizing: border-box;
        }
    </style>
</head>
<body>
    
    <div class="gambar-kepala">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjo66nQHpyZ0fp3n9YykQufHZ588vRii8FtfWy7y8fO2wmCMaA3FoR6LBEKGO6avnztclQ6zwNBnkYOhiMcMQS0eLJtm_6p5mnp5JywiW-QnphUTcYfP0hFtVPhPqBpyHrZmYO_-_DMQTjTIHxwh4Wgc5S3o3u6Bscssv-GAg72vZqRKn2HJYpBMGAu6LQ=s200" alt="Logo Sekolah" />
      </div>

      <div class="scanner-container">
        <h1>E-Ujian SMA Negeri 4 Barru</h1>
        <p style="color: #666666; font-size: 14px; margin-bottom: 20px;">
               Masukkan tautan, pilih ujian aktif, atau scan QR Code untuk membuka halaman ujian.
          </p>
            
          <div class="box-input">
            <div class="input-group">
                <input id="urlInput" placeholder="Masukkan tautan ujian..." type="url" />
                <button class="btn-action" id="btnLoadManual">Buka</button>
              </div>
              <button class="btn-action" id="btnList" onclick="window.location.href='https://ujian.sman4barru.sch.id/lobi/';">Pilih Ujian Aktif</button>
            <button class="btn-action" id="btnToggleScan">Scan QR Code</button>
        </div>

         <div id="reader"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let html5QrcodeScanner = null;

            // ==========================================
            // SEBELUM DI-SAVE, GANTI DI BAWAH INI DENGAN URL HALAMAN B ANDA:
            const halamanViewerUrl = "https://ujian.sman4barru.sch.id/run/";

            const btnLoadManual = document.getElementById('btnLoadManual');
            const btnToggleScan = document.getElementById('btnToggleScan');
            const urlInput = document.getElementById('urlInput');

            if (btnLoadManual) btnLoadManual.addEventListener('click', loadIframeFromInput);
            if (btnToggleScan) btnToggleScan.addEventListener('click', toggleScanner);

            function kirimKeViewer(url) {
                let targetUrl = url.trim();
                // Bersihkan atau encode URL agar aman dilempar via address bar
                let encodedUrl = encodeURIComponent(targetUrl);
            
                // Ambil waktu detik saat ini secara real-time saat siswa klik/scan
                const tokenWaktuAktif = Math.floor(Date.now() / 1000);
            
                // Lempar pengguna ke Halaman B menggunakan .replace() + bawa Token Waktu Berlapis
                window.location.replace(halamanViewerUrl + "?url=" + encodedUrl + "&auth=" + tokenWaktuAktif);
            }

            function loadIframeFromInput() {
                const inputVal = urlInput.value;
                if (inputVal) {
                    kirimKeViewer(inputVal);
                } else {
                    alert("Harap masukkan tautan terlebih dahulu!");
                }
            }

            function toggleScanner() {
                const readerDiv = document.getElementById('reader');

                if (!html5QrcodeScanner) {
                    readerDiv.style.display = 'block';
                    btnToggleScan.innerText = "Matikan Kamera QR";
                    btnToggleScan.style.backgroundColor = "#dc3545";

                    html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                    );
                    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                } else {
                    stopScanner();
                }
            }

            function onScanSuccess(decodedText, decodedResult) {
                stopScanner();
                kirimKeViewer(decodedText);
            }

            function onScanFailure(error) {
                // Abaikan error real-time scanning
            }

            function stopScanner() {
                const readerDiv = document.getElementById('reader');
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.clear().then(() => {
                        html5QrcodeScanner = null;
                        readerDiv.style.display = 'none';
                        btnToggleScan.innerText = "Scan QR Code";
                        btnToggleScan.style.backgroundColor = "#28a745";
                    }).catch(err => {
                        console.error(err);
                    });
                }
            }
        });
          
        // =========================================================================
        // ANTI-BACK TOTAL: PENGUNCI GERBANG UTAMA (HALAMAN A)
        // =========================================================================
        (function () {
            function kunciRiwayat() {
                window.history.pushState(null, null, window.location.href);
            }

            kunciRiwayat();

            window.addEventListener('popstate', function (event) {
                kunciRiwayat();
            });
        })();
    </script>
</body>
</html>
