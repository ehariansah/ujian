<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ujian SMAN 4 Barru</title>
    <link rel="icon" type="image/png" href="./favicon.png">

    <link rel="apple-touch-icon" href="./favicon.png">

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <link rel="manifest" href="./manifest.json">

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./service-worker.js')
            .then((reg) => console.log('Service Worker terdaftar!', reg))
            .catch((err) => console.log('Gagal mendaftarkan Service Worker', err));
        });
      }
    </script>

    <style>
		*, ::before, ::after {
            box-sizing: border-box;
        }
		
        body {
            padding: 40px 20px;
            background: linear-gradient(rgb(26, 97, 153) 270px, rgb(233, 231, 247) 270px);
            min-height: 100dvh;
            margin: 0;
        }
        
        .gambar-kepala {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .gambar-kepala img {
            width: 100px;
            height: 100px;
            margin: 0 !important;
        }

        .scanner-container {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 500px;
            margin: 0 auto;
            padding: 25px 15px;
            background: rgb(255, 255, 255);
            border-radius: 15px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 10px 25px;
        }

        .scanner-container h1 {
	    	font-size: 20px;
	    	margin: 0 0 10px;
    	}

        .box-input {
            padding: 15px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
        }

        .input-group {
            display: flex;
            flex-wrap: unset;
            gap: 10px;
            margin-bottom: 15px;
        }

        .input-group input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            width: 75%;
        }

        .btn-action {
            padding: 12px 0;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
			width: 25%;
        }

        #btnList {
            margin-bottom: 15px;
        }

        #btnList, #btnToggleScan {
            width: 100%;
            background: #28a745;
        }

        #reader {
            width: 100%;
            max-width: 470px;
            border-radius: 10px;
            overflow: hidden;
            display: none;
            background: #000;
            color: #fff;
			margin-top: 15px;
        }
    </style>
</head>
<body>
    
    <div class="gambar-kepala">
        <img src="https://blogger.googleusercontent.com/img/a/AVvXsEjo66nQHpyZ0fp3n9YykQufHZ588vRii8FtfWy7y8fO2wmCMaA3FoR6LBEKGO6avnztclQ6zwNBnkYOhiMcMQS0eLJtm_6p5mnp5JywiW-QnphUTcYfP0hFtVPhPqBpyHrZmYO_-_DMQTjTIHxwh4Wgc5S3o3u6Bscssv-GAg72vZqRKn2HJYpBMGAu6LQ=s200" alt="Logo Sekolah" />
      </div>

      <div class="scanner-container">
        <h1>E-UJIAN SMAN 4 BARRU</h1>
        <p style="color: #666666; font-size: 14px; margin-bottom: 20px;">
               Masukkan tautan, pilih ujian aktif, atau scan QR Code untuk membuka halaman ujian.
          </p>
            
          <div class="box-input">
            <div class="input-group">
                <input id="urlInput" placeholder="Masukkan tautan ujian..." type="url" />
                <button class="btn-action" id="btnLoadManual">Buka</button>
              </div>
              <button class="btn-action" id="btnList" onclick="window.location.href='https://ujian.sman4barru.sch.id/lobi/';">Pilih Ujian Aktif</button>
            <button class="btn-action" id="btnToggleScan">Scan QR Code</button>
        </div>

         <div id="reader"></div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            let html5QrcodeScanner = null;

            // ==========================================
            // SEBELUM DI-SAVE, GANTI DI BAWAH INI DENGAN URL HALAMAN B ANDA:
            const halamanViewerUrl = "https://ujian.sman4barru.sch.id/run/";

            const btnLoadManual = document.getElementById('btnLoadManual');
            const btnToggleScan = document.getElementById('btnToggleScan');
            const urlInput = document.getElementById('urlInput');

            if (btnLoadManual) btnLoadManual.addEventListener('click', loadIframeFromInput);
            if (btnToggleScan) btnToggleScan.addEventListener('click', toggleScanner);

            function kirimKeViewer(url) {
                let targetUrl = url.trim();
                // Bersihkan atau encode URL agar aman dilempar via address bar
                let encodedUrl = encodeURIComponent(targetUrl);
            
                // Ambil waktu detik saat ini secara real-time saat siswa klik/scan
                const tokenWaktuAktif = Math.floor(Date.now() / 1000);
            
                // Lempar pengguna ke Halaman B menggunakan .replace() + bawa Token Waktu Berlapis
                window.location.replace(halamanViewerUrl + "?url=" + encodedUrl + "&auth=" + tokenWaktuAktif);
            }

            function loadIframeFromInput() {
                const inputVal = urlInput.value;
                if (inputVal) {
                    kirimKeViewer(inputVal);
                } else {
                    alert("Harap masukkan tautan terlebih dahulu!");
                }
            }

            function toggleScanner() {
                const readerDiv = document.getElementById('reader');

                if (!html5QrcodeScanner) {
                    readerDiv.style.display = 'block';
                    btnToggleScan.innerText = "Matikan Kamera QR";
                    btnToggleScan.style.backgroundColor = "#dc3545";

                    html5QrcodeScanner = new Html5QrcodeScanner(
                        "reader", { fps: 10, qrbox: { width: 250, height: 250 } }, false
                    );
                    html5QrcodeScanner.render(onScanSuccess, onScanFailure);
                } else {
                    stopScanner();
                }
            }

            function onScanSuccess(decodedText, decodedResult) {
                stopScanner();
                kirimKeViewer(decodedText);
            }

            function onScanFailure(error) {
                // Abaikan error real-time scanning
            }

            function stopScanner() {
                const readerDiv = document.getElementById('reader');
                if (html5QrcodeScanner) {
                    html5QrcodeScanner.clear().then(() => {
                        html5QrcodeScanner = null;
                        readerDiv.style.display = 'none';
                        btnToggleScan.innerText = "Scan QR Code";
                        btnToggleScan.style.backgroundColor = "#28a745";
                    }).catch(err => {
                        console.error(err);
                    });
                }
            }
        });
          
        // =========================================================================
        // ANTI-BACK TOTAL: PENGUNCI GERBANG UTAMA (HALAMAN A)
        // =========================================================================
        (function () {
            function kunciRiwayat() {
                window.history.pushState(null, null, window.location.href);
            }

            kunciRiwayat();

            window.addEventListener('popstate', function (event) {
                kunciRiwayat();
            });
        })();
    </script>
	
	<script>
    document.addEventListener("DOMContentLoaded", function() {
        const kamusKata = {
            "Request Camera Permission": "Izinkan Kamera Ujian",
            "Select Camera": "Pilih Kamera",
            "Start Scanning": "Mulai Memindai",
            "Stop Scanning": "Matikan Kamera",
            "Scan an Image File": "Pindai dari File Gambar",
            "or select an image file": "atau pilih file gambar",
            "No camera found": "Kamera tidak ditemukan",
            "camera 0, facing back": "Kamera Belakang Utama",
            "camera 1, facing front": "Kamera Depan",
            "facing back": "Kamera Belakang",
            "facing front": "Kamera Depan"
        };

        function paksaKameraBelakang() {
            const selectKamera = document.querySelector("#reader select");
            
            if (selectKamera && !selectKamera.dataset.autoSelected) {
                let opsiKetemu = false;

                for (let i = 0; i < selectKamera.options.length; i++) {
                    const teksOpsi = selectKamera.options[i].text.toLowerCase();
                    if (teksOpsi.includes("back") || teksOpsi.includes("belakang")) {
                        selectKamera.selectedIndex = i;
                        opsiKetemu = true;
                        break;
                    }
                }

                if (opsiKetemu) {
                    selectKamera.dataset.autoSelected = "true";
                    selectKamera.dispatchEvent(new Event('change'));
                }
            }
        }

        function eksekusiTerjemahOtomatis() {
            paksaKameraBelakang();

            const elemenTarget = document.querySelectorAll("#reader, #reader *");
            
            elemenTarget.forEach(elemen => {
                if (elemen.childNodes.length > 0) {
                    elemen.childNodes.forEach(node => {
                        if (node.nodeType === Node.TEXT_NODE) {
                            const teksAsli = node.nodeValue.trim();
                            for (let [kataInggris, kataIndonesia] of Object.entries(kamusKata)) {
                                if (teksAsli.toLowerCase().includes(kataInggris.toLowerCase())) {
                                    node.nodeValue = node.nodeValue.replace(new RegExp(kataInggris, "gi"), kataIndonesia);
                                }
                            }
                        }
                    });
                }
                
                if (elemen.value) {
                    for (let [kataInggris, kataIndonesia] of Object.entries(kamusKata)) {
                        if (elemen.value.toLowerCase().includes(kataInggris.toLowerCase())) {
                            elemen.value = elemen.value.replace(new RegExp(kataInggris, "gi"), kataIndonesia);
                        }
                    }
                }
            });
        }

        const targetKotakScanner = document.getElementById('reader');
        if (targetKotakScanner) {
            const pengamat = new MutationObserver(function() {
                eksekusiTerjemahOtomatis();
            });
            
            pengamat.observe(targetKotakScanner, { childList: true, subtree: true });
        }
    });
</script>
</body>
</html>
