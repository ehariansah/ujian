<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Token Pengawas - SMAN 4 Barru</title>
    <link rel="icon" type="image/png" href="../favicon.png">
    
    <style>
        :root {
            --primary-color: #1a6199;
            --dark-color: #212529;
            --warning-color: #ffbf00;
            --light-bg: #f8f9fa;
        }

        *, ::before, ::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(rgb(26, 97, 153) 250px, rgb(233, 231, 247) 250px);
            margin: 0;
            padding: 20px;
            align-items: center;
            min-height: 100dvh;
            color: var(--dark-color);
        }

        .token-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: rgba(0, 0, 0, 0.15) 0px 10px 25px;
            text-align: center;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .logo-sekolah {
            width: 100px;
            height: 100px;
            margin: 0 auto 20px;
        }

        .logo-sekolah img {
            width: 100px;
            height: 100px;
        }

        .token-card h1 {
            font-size: 20px;
            margin: 0 0 10px;
            color: var(--primary-color);
        }

        .token-card p.subtitle {
            font-size: 14px;
            color: #6c757d;
            margin: 0 0 20px;
        }

        /* Tampilan Utama Blok Token */
        .token-display-box {
            background: #f1f3f5;
            padding: 25px 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ced4da;
            position: relative;
        }

        .token-label {
            font-size: 12px;
            font-weight: bold;
            color: #868e96;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .token-code {
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, Consolas, Liberation Mono, monospace;
            font-size: 54px;
            font-weight: 900;
            letter-spacing: 6px;
            color: #0b3c66;
            margin: 0;
            user-select: all;
        }

        /* Komponen Hitung Mundur & Progress Bar */
        .timer-container {
            margin-top: 20px;
        }

        .timer-text {
            font-size: 15px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 8px;
        }

        #menitDetik {
            color: #dc3545;
            font-weight: bold;
        }

        .progress-bar-bg {
            background-color: #e9ecef;
            height: 8px;
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar-fill {
            background: #1a6199;
            height: 100%;
            width: 100%;
            border-radius: 10px;
            transition: width 1s linear;
        }

        /* Catatan Kaki */
        .footer-note {
            margin-top: 20px;
            font-size: 11px;
            color: #adb5bd;
            line-height: 1.5;
        }
    </style>
</head>
<body>
    <div class="logo-sekolah">
        <img href="../logo200.png" alt="Logo SMAN 4 Barru">
    </div>
    <div class="token-card">
        
        <h1>TOKEN MASUK UJIAN</h1>
        <p class="subtitle">Bagikan token ini kepada peserta untuk masuk sesi ujian.</p>

        <div class="token-display-box">
            <div class="token-label">Token Berlaku Saat Ini</div>
            <div class="token-code" id="kodeTokenTampil">------</div>
        </div>

        <div class="timer-container">
            <div class="timer-text">
                Token diperbarui dalam: <span id="menitDetik">05:00</span>
            </div>
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="barProgress"></div>
            </div>
        </div>

        <div class="footer-note">
            *Token ini digenerate otomatis secara sinkron setiap 5 menit.<br>
            Pastikan jam pada gawai pengawas dan siswa sudah diatur otomatis (Internet).
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const tokenTampil = document.getElementById('kodeTokenTampil');
            const menitDetikTampil = document.getElementById('menitDetik');
            const barProgress = document.getElementById('barProgress');

            const DURASI_LIMA_MENIT = 5 * 60; // 300 Detik

            // Algoritma Generator String Token Acak 6 Digit Khas Aplikasi Ujian
            function produksiTokenAcak(stempelWaktuBlok) {
                // Karakter yang mudah dibaca (menghilangkan 'I', 'O', '0', '1' agar siswa tidak salah ketik)
                const alfabetKandidat = "ABCDEFGHJKLMNPQRSTUVWXYZ23456789";
                
                // Menggunakan stempel waktu blok sebagai seed pseudo-random sederhana
                let nilaiSaran = stempelWaktuBlok;
                let hasilToken = "";
                
                for (let i = 0; i < 6; i++) {
                    nilaiSaran = (nilaiSaran * 9301 + 49297) % 233280;
                    const indeksKarakter = Math.floor((nilaiSaran / 233280) * alfabetKandidat.length);
                    hasilToken += alfabetKandidat.charAt(indeksKarakter);
                }
                return hasilToken;
            }

            function siklusPenjagaToken() {
                const detikUnixSekarang = Math.floor(Date.now() / 1000);
                
                // Cari awal mula blok 5 menit berjalan saat ini
                const sisaDetikBlokBerjalan = detikUnixSekarang % DURASI_LIMA_MENIT;
                const awalBlokLimaMenit = detikUnixSekarang - sisaDetikBlokBerjalan;
                
                // Generate token berdasarkan waktu blok saat ini
                const tokenAktif = produksiTokenAcak(awalBlokLimaMenit);
                tokenTampil.innerText = tokenAktif;

                // Hitung sisa waktu mundur untuk blok ini
                const sisaWaktuMundur = DURASI_LIMA_MENIT - sisaDetikBlokBerjalan;
                
                // Format menit dan detik teks
                const menit = Math.floor(sisaWaktuMundur / 60);
                const detik = sisaWaktuMundur % 60;
                menitDetikTampil.innerText = `${menit.toString().padStart(2, '0')}:${detik.toString().padStart(2, '0')}`;

                // Atur penyusutan Bar Progress secara visual (0% sampai 100%)
                const persentaseSisa = (sisaWaktuMundur / DURASI_LIMA_MENIT) * 100;
                barProgress.style.width = persentaseSisa + "%";

                // Simpan token aktif saat ini ke LocalStorage agar Halaman D bisa membaca token yang sama
                localStorage.setItem('token_ujian_aktif_sman4', tokenAktif);
            }

            // Jalankan detak pertama kali halaman dibuka
            siklusPenjagaToken();

            // Lakukan pembaruan rutin setiap 1 detik
            setInterval(siklusPenjagaToken, 1000);
        });
    </script>
</body>
</html>
